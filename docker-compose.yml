services:
  api:
    build: ./api
    restart: unless-stopped
    environment:
      - DATABASE_URL
      - SUPABASE_URL
      - SUPABASE_ANON_KEY
      - YOUTUBE_API_KEY
      - ODESLI_API_KEY
      - SPOTIFY_CLIENT_ID
      - SPOTIFY_CLIENT_SECRET
      - ALLOWED_ORIGINS
      - FRONTEND_URL
      - ROOT_PATH
      - COOKIE_DOMAIN
      - COOKIE_SAMESITE
