name: Deploy Observability Stack

on:
  push:
    branches: [main]
    paths:
      - "observability/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-observability.yml"
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy → Loki + Promtail + Grafana
    runs-on: [self-hosted, musicone-prod]
    steps:
      - uses: actions/checkout@v4
      - name: Deploy observability stack
        env:
          GRAFANA_PASSWORD: ${{ secrets.GRAFANA_PASSWORD }}
          GF_SERVER_ROOT_URL: ${{ vars.GRAFANA_ROOT_URL }}
        run: |
          docker-compose -f docker-compose.yml up -d loki promtail grafana
          docker image prune -f
      - name: Health check
        run: |
          sleep 10
          curl -f http://127.0.0.1:3100/ready || exit 1
          curl -f http://127.0.0.1:3000/api/health || exit 1
