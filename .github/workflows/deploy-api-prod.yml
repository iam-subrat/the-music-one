name: Deploy Production API

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "docker-compose*.yml"
      - ".github/workflows/deploy-api-prod.yml"
  workflow_dispatch:

jobs:
  migrate:
    name: Migrate → Production DB
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: latest
      - run: uv sync
      - run: uv run alembic upgrade head
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

  deploy:
    name: Deploy → Production
    needs: migrate
    runs-on: [self-hosted, musicone-prod]
    environment: production
    env:
      COMPOSE_PROJECT_NAME: musicone-prod
    steps:
      - uses: actions/checkout@v4
      - name: Build & deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          ODESLI_API_KEY: ${{ secrets.ODESLI_API_KEY }}
          ALLOWED_ORIGINS: ${{ vars.ALLOWED_ORIGINS }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          ROOT_PATH: ${{ vars.ROOT_PATH }}
          COOKIE_DOMAIN: ${{ vars.COOKIE_DOMAIN }}
          COOKIE_SAMESITE: ${{ vars.COOKIE_SAMESITE }}
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build api
          docker image prune -f
      - name: Health check
        run: |
          sleep 15
          curl -f http://127.0.0.1:8000/api/health || exit 1
