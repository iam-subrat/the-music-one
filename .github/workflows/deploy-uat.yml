name: Deploy to UAT (Cloudflare Pages)

on:
  push:
    branches: [uat]

permissions:
  contents: read
  deployments: write

jobs:
  migrate:
    runs-on: ubuntu-latest
    environment: uat
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v3
        with:
          version: latest

      - name: Install dependencies
        run: uv sync

      - name: Run DB migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_JWT_SECRET: ${{ secrets.SUPABASE_JWT_SECRET }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: uv run alembic upgrade head

  deploy:
    needs: migrate
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Build UI
        working-directory: ui
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          FLAG_JAM_SESSION: 'true'
          FLAG_VOTE_TO_SKIP: 'true'
          FLAG_DJ_TOKEN: 'true'
          FLAG_YOUTUBE_EMBED: 'true'
          FLAG_AUTO_PLAY_QUEUE: 'true'
          FLAG_PLATFORM_AUTODETECT: 'true'
          FLAG_REACTIONS: 'false'
          FLAG_CHAT: 'false'
          FLAG_SESSION_HISTORY: 'false'
          FLAG_USER_PROFILES: 'false'
          FLAG_SHARED_PLAYLISTS: 'false'
          FLAG_DISCOVERY_FEED: 'false'
          FLAG_TASTE_MATCHING: 'false'
          FLAG_SCHEDULED_JAMS: 'false'
          FLAG_QUEUE_RULES: 'false'
          FLAG_EMBED_WIDGET: 'false'
        run: npm run build

      - name: Deploy to Cloudflare Pages (UAT)
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: ${{ vars.CLOUDFLARE_PROJECT_NAME }}
          directory: ui/dist
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
