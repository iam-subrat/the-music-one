name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Run DB migrations
        run: supabase db push --project-ref hjcezrajovkpiwdihduy
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
          VITE_SEARXNG_PROXY_URL: ${{ secrets.VITE_SEARXNG_PROXY_URL }}
          FLAG_JAM_SESSION: 'true'
          FLAG_VOTE_TO_SKIP: 'true'
          FLAG_DJ_TOKEN: 'true'
          FLAG_YOUTUBE_EMBED: 'true'
          FLAG_AUTO_PLAY_QUEUE: 'true'
          FLAG_PLATFORM_AUTODETECT: 'true'
          FLAG_REACTIONS: 'false'
          FLAG_CHAT: 'false'
          FLAG_SESSION_HISTORY: 'false'
          FLAG_USER_PROFILES: 'false'
          FLAG_SHARED_PLAYLISTS: 'false'
          FLAG_DISCOVERY_FEED: 'false'
          FLAG_TASTE_MATCHING: 'false'
          FLAG_SCHEDULED_JAMS: 'false'
          FLAG_QUEUE_RULES: 'false'
          FLAG_EMBED_WIDGET: 'false'
        run: npm run build

      - name: Write CNAME
        run: echo "${{ vars.CNAME_DOMAIN }}" > dist/CNAME

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4
