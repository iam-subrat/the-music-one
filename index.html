<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MusicOne — Find on any platform</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f13;
      --surface: #1a1a24;
      --border: #2a2a3a;
      --accent: #7c6af7;
      --accent-hover: #9585ff;
      --text: #e8e8f0;
      --muted: #8888a0;
      --radius: 14px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px 80px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }

    header h1 {
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    header p {
      color: var(--muted);
      margin-top: 6px;
      font-size: 0.9rem;
    }

    /* Input form */
    #input-form {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    #input-form label {
      font-size: 0.85rem;
      color: var(--muted);
      letter-spacing: 0.3px;
    }

    #input-form input {
      width: 100%;
      padding: 14px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #input-form input:focus { border-color: var(--accent); }

    #input-form button {
      padding: 13px;
      border-radius: var(--radius);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    #input-form button:hover { background: var(--accent-hover); }

    /* Song info */
    #song-info {
      text-align: center;
      margin-bottom: 32px;
      display: none;
    }

    #song-info .label {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    #song-info .title {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    #song-info .artist {
      font-size: 1rem;
      color: var(--muted);
      margin-top: 4px;
    }

    #song-info .actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    #song-info .actions button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 0.82rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    #song-info .actions button:hover { border-color: var(--accent); color: var(--accent); }

    /* Grid */
    #grid {
      display: none;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 14px;
      width: 100%;
      max-width: 800px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      text-decoration: none;
      color: var(--text);
      transition: border-color 0.2s, transform 0.15s;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card .icon {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card .icon img { display: block; }

    .card .name {
      font-size: 0.82rem;
      font-weight: 600;
      text-align: center;
      letter-spacing: 0.2px;
    }

    .card .search-label {
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* Spinner */
    #loader {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* Error */
    #error {
      display: none;
      text-align: center;
      max-width: 420px;
    }

    #error .icon { font-size: 2rem; margin-bottom: 10px; }
    #error p { color: var(--muted); font-size: 0.9rem; line-height: 1.6; }
    #error a { color: var(--accent); text-decoration: none; cursor: pointer; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #2a2a3a;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px 20px;
      border-radius: 99px;
      font-size: 0.85rem;
      transition: transform 0.3s ease;
      pointer-events: none;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <header>
    <h1>MusicOne</h1>
    <p>Paste any streaming link — search it on every platform</p>
  </header>

  <div id="input-form">
    <label for="url-input">Streaming URL (Spotify, YouTube Music, Apple Music…)</label>
    <input id="url-input" type="url" placeholder="https://open.spotify.com/track/..." />
    <button onclick="submitUrl()">Find on all platforms</button>
  </div>

  <div id="loader">
    <div class="spinner"></div>
    <span>Fetching song info…</span>
  </div>

  <div id="error">
    <div class="icon">⚠️</div>
    <p id="error-msg"></p>
    <p style="margin-top:12px"><a onclick="reset()">← Try another link</a></p>
  </div>

  <div id="song-info">
    <div class="label">Found song</div>
    <div class="title" id="song-title"></div>
    <div class="artist" id="song-artist"></div>
    <div class="actions">
      <button onclick="copyPageLink()">📋 Copy page link</button>
      <button onclick="reset()">← New search</button>
    </div>
  </div>

  <div id="grid"></div>

  <div id="toast"></div>

  <script>
    function makeInitials(p) {
      const span = document.createElement('span');
      span.textContent = p.initials || p.name.slice(0, 2);
      span.style.cssText = `font-size:0.8rem;font-weight:700;color:${p.color};letter-spacing:-0.5px`;
      return span;
    }

    const PLATFORMS = [
      {
        name: 'Spotify',
        slug: 'spotify',
        color: '#1DB954',
        url: q => `https://open.spotify.com/search/${q}`,
      },
      {
        name: 'Apple Music',
        slug: 'applemusic',
        color: '#FC3C44',
        url: q => `https://music.apple.com/search?term=${q}`,
      },
      {
        name: 'YouTube Music',
        slug: 'youtubemusic',
        color: '#FF0000',
        url: q => `https://music.youtube.com/search?q=${q}`,
      },
      {
        name: 'Amazon Music',
        slug: null,
        iconUrl: 'https://www.google.com/s2/favicons?domain=music.amazon.com&sz=64',
        color: '#00A8E1',
        url: q => `https://music.amazon.in/search/${q}`,
      },
      {
        name: 'Tidal',
        slug: 'tidal',
        color: '#00FFFF',
        url: q => `https://tidal.com/search?q=${q}`,
      },
      {
        name: 'Deezer',
        slug: 'deezer',
        color: '#FEAA2D',
        url: q => `https://www.deezer.com/search/${q}`,
      },
      {
        name: 'SoundCloud',
        slug: 'soundcloud',
        color: '#FF5500',
        url: q => `https://soundcloud.com/search?q=${q}`,
      },
      {
        name: 'JioSaavn',
        slug: null,
        iconUrl: 'https://www.google.com/s2/favicons?domain=jiosaavn.com&sz=64',
        color: '#2BC5B4',
        url: q => `https://www.jiosaavn.com/search/${q}`,
      },
      {
        name: 'Gaana',
        slug: null,
        iconUrl: 'https://www.google.com/s2/favicons?domain=gaana.com&sz=64',
        color: '#E72C30',
        url: q => `https://gaana.com/search/${q}`,
      },
    ];

    function show(id, flex) {
      document.getElementById(id).style.display = flex ? 'flex' : 'block';
    }
    function hide(id) { document.getElementById(id).style.display = 'none'; }

    function toast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 2200);
    }

    function reset() {
      hide('song-info');
      hide('grid');
      hide('error');
      show('input-form', false);
      history.replaceState({}, '', location.pathname);
    }

    function submitUrl() {
      const val = document.getElementById('url-input').value.trim();
      if (!val) return;
      const params = new URLSearchParams({ url: val });
      history.pushState({}, '', '?' + params.toString());
      run(val);
    }

    function copyPageLink() {
      navigator.clipboard.writeText(location.href).then(() => toast('Link copied!'));
    }

    async function run(streamUrl) {
      hide('input-form');
      hide('error');
      hide('song-info');
      hide('grid');
      show('loader', true);

      try {
        const res = await fetch(
          `https://api.song.link/v1-alpha.1/links?url=${encodeURIComponent(streamUrl)}`
        );

        if (!res.ok) throw new Error(`API error ${res.status}`);

        const data = await res.json();
        const key = Object.keys(data.entitiesByUniqueId)[0];
        const entity = data.entitiesByUniqueId[key];

        if (!entity) throw new Error('Could not identify song from this URL.');

        const { title, artistName } = entity;
        const q = encodeURIComponent(`${title} ${artistName}`);

        document.getElementById('song-title').textContent = title;
        document.getElementById('song-artist').textContent = artistName;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        PLATFORMS.forEach(p => {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = p.url(q);
          a.target = '_blank';
          a.rel = 'noopener noreferrer';

          const iconDiv = document.createElement('div');
          iconDiv.className = 'icon';
          iconDiv.style.background = p.color + '22';

          function makeImg(src, fallbackFn) {
            const img = document.createElement('img');
            img.src = src;
            img.width = 28;
            img.height = 28;
            img.alt = p.name;
            img.onerror = () => img.replaceWith(fallbackFn());
            return img;
          }

          if (p.slug) {
            const simpleIconSrc = `https://cdn.simpleicons.org/${p.slug}/${p.color.replace('#', '')}`;
            const fallback = p.iconUrl
              ? () => makeImg(p.iconUrl, () => makeInitials(p))
              : () => makeInitials(p);
            iconDiv.appendChild(makeImg(simpleIconSrc, fallback));
          } else if (p.iconUrl) {
            iconDiv.appendChild(makeImg(p.iconUrl, () => makeInitials(p)));
          } else {
            iconDiv.appendChild(makeInitials(p));
          }

          a.appendChild(iconDiv);
          a.innerHTML += `
            <div class="name">${p.name}</div>
            <div class="search-label">Search ↗</div>
          `;
          grid.appendChild(a);
        });

        hide('loader');
        show('song-info', false);
        grid.style.display = 'grid';
      } catch (err) {
        hide('loader');
        document.getElementById('error-msg').textContent =
          err.message || 'Failed to fetch song info. Check the URL and try again.';
        show('error', false);
      }
    }

    // On load — check for ?url= param
    const params = new URLSearchParams(location.search);
    const urlParam = params.get('url');
    if (urlParam) {
      document.getElementById('url-input').value = urlParam;
      run(urlParam);
    }

    // Enter key on input
    document.getElementById('url-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') submitUrl();
    });
  </script>
</body>
</html>
